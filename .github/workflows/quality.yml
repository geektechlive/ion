name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint
        uses: raven-actions/actionlint@v2

  file-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check file-size caps
        run: bash scripts/check-file-sizes.sh

  engine-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: engine/go.mod
      - name: Unit tests with race detector
        working-directory: engine
        run: go test -race ./...
      - name: Contract manifest up to date
        working-directory: engine
        run: go test ./internal/types/ -run TestContractManifest -v
      - name: Integration tests with race detector
        working-directory: engine
        run: go test -race -tags integration ./tests/integration/...

  engine-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Need full history so golangci-lint can compute a local diff
          # against origin/main without touching the GitHub PR-diff API
          # (20K-line cap; large PRs fall back to all-issues mode).
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: engine/go.mod

      # PR: differential lint — only issues on lines changed since the
      # branch diverged from main. Fast feedback, good DX.
      # We pass --new-from-merge-base as a direct CLI flag instead of
      # `only-new-issues: true` because the latter relies on the GitHub
      # PR-diff REST endpoint, which 422s above 20K lines and trips the
      # action's "report everything" fallback.
      - name: golangci-lint engine (changed lines)
        if: github.event_name == 'pull_request'
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          working-directory: engine
          args: --new-from-merge-base=origin/main
      - name: golangci-lint relay (changed lines)
        if: github.event_name == 'pull_request'
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          working-directory: relay
          args: --new-from-merge-base=origin/main

      # Main: full lint — catches cross-PR regressions that slip through
      # differential checks (e.g. PR A adds a function, PR B removes its
      # only caller → unused error only visible after both merge).
      - name: golangci-lint engine (full)
        if: github.event_name == 'push'
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          working-directory: engine
      - name: golangci-lint relay (full)
        if: github.event_name == 'push'
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          working-directory: relay

  engine-vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: engine/go.mod
      - name: govulncheck (engine)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        working-directory: engine
      - name: govulncheck (relay)
        run: govulncheck ./...
        working-directory: relay

  relay-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: relay/go.mod
      - name: Unit tests with race detector
        working-directory: relay
        run: go test -race ./...

  desktop-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - name: Install dependencies
        working-directory: desktop
        run: npm ci --ignore-scripts
      - name: Type-check
        working-directory: desktop
        run: npm run typecheck
      - name: Run tests
        working-directory: desktop
        run: npm test

  desktop-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: npm audit (high+ only, prod deps)
        working-directory: desktop
        run: npm audit --audit-level=high --omit=dev

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build engine image
        uses: docker/build-push-action@v7
        with:
          context: engine
          push: false
          platforms: linux/amd64
          tags: ion-engine:ci

  ios-build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Build iOS app
        working-directory: ios
        run: |
          xcodebuild \
            -project IonRemote.xcodeproj \
            -scheme IonRemote \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
