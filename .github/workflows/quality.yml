name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint
        uses: raven-actions/actionlint@v2

  file-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check file-size caps
        run: bash scripts/check-file-sizes.sh

  status-writers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check status-writer chokepoints
        # Phase 4 of the state-management overhaul. Prohibits new direct
        # writes to tab.status / inst.statusFields outside the
        # dispatcher chokepoints whitelisted in the script. A failure
        # here is intentional — add your call site to the whitelist
        # only if you have reviewed and approved the engine-vs-client
        # state-ownership rule documented in CLAUDE.md.
        run: bash scripts/check-status-writers.sh

  engine-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: engine/go.mod
      - name: Unit tests with race detector
        working-directory: engine
        run: go test -race ./...
      - name: Contract manifest up to date
        working-directory: engine
        run: go test ./internal/types/ -run TestContractManifest -v
      - name: Integration tests with race detector
        working-directory: engine
        run: go test -race -tags integration ./tests/integration/...

  engine-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: engine/go.mod

      # Full lint on every event (PR and push). We previously ran
      # --new-from-merge-base=origin/main on PRs and full on push, but:
      #
      #  1. Differential mode does not speed up CI — golangci-lint still
      #     analyses the entire module; the flag only post-filters the
      #     report. In practice the two modes ran within ~1s of each
      #     other in this repo.
      #
      #  2. Differential mode let lint debt accumulate invisibly: a PR
      #     would land green, then the immediate push-to-main full run
      #     would surface dozens of pre-existing findings nobody had
      #     incentive to fix. That is exactly what happened to PR #131
      #     (44 errcheck/staticcheck/ineffassign findings, none in the
      #     PR's diff, all surfaced only on merge).
      #
      # Running full lint on PRs means the author may occasionally see
      # findings from elsewhere in the codebase. The cure is a small
      # cleanup commit, not hiding the findings. The module is small
      # enough that a full lint sweep is cheap.
      - name: golangci-lint engine
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          working-directory: engine
      - name: golangci-lint relay
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          working-directory: relay

  engine-vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: engine/go.mod
      - name: govulncheck (engine)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        working-directory: engine
      - name: govulncheck (relay)
        run: govulncheck ./...
        working-directory: relay

  relay-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: relay/go.mod
      - name: Unit tests with race detector
        working-directory: relay
        run: go test -race ./...

  desktop-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - name: Install dependencies
        working-directory: desktop
        run: npm ci --ignore-scripts
      - name: Type-check
        working-directory: desktop
        run: npm run typecheck
      - name: Run tests
        working-directory: desktop
        run: npm test

  desktop-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: npm audit (high+ only, prod deps)
        working-directory: desktop
        run: npm audit --audit-level=high --omit=dev

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build engine image
        uses: docker/build-push-action@v7
        with:
          context: engine
          push: false
          platforms: linux/amd64
          tags: ion-engine:ci

  ios-build:
    # macos-26 ships Xcode 26 / the iOS 26 SDK. The iOS app contains
    # ios/IonRemote/Services/ModernSpeechEngine.swift, which is gated
    # @available(iOS 26, *) and references iOS-26-only symbols
    # (SpeechAnalyzer, SpeechTranscriber, AnalyzerInput) at file scope.
    # Those symbols do not exist in the iOS 17-18 SDK that Xcode 16 (the
    # default on macos-15) ships, so building on macos-15 fails with
    # exit 65 even though every use site is gated. Xcode 26 is also
    # what our Xcode Cloud iOS job uses.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - name: Build iOS app
        working-directory: ios
        run: |
          xcodebuild \
            -project IonRemote.xcodeproj \
            -scheme IonRemote \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
