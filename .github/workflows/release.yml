name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'engine/**'
      - 'desktop/**'
      - 'relay/**'
      - 'ios/**'
      - 'release-please-*.json'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no changes)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created || 'false' }}
      release_report: ${{ steps.release.outputs.release_report || '{"releases":[],"components":[],"summary":{"total_releases":0,"total_commits":0,"by_bump_type":{"major":0,"minor":0,"patch":0}}}' }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Check if should skip
        id: check-skip
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [[ "${COMMIT_MSG}" == *"[skip ci]"* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: commit message contains [skip ci]"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run release-damnit
        id: release
        if: steps.check-skip.outputs.skip == 'false'
        uses: dsswift/release-damnit@main
        with:
          token: ${{ steps.app-token.outputs.token }}
          dry-run: ${{ inputs.dry_run || 'false' }}
          create-releases: 'true'

      - name: Commit version updates
        if: steps.check-skip.outputs.skip == 'false' && steps.release.outputs.releases_created == 'true' && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add '*/VERSION' '*/CHANGELOG.md' 'release-please-manifest.json'

          if ! git diff --staged --quiet; then
            git commit -m "chore: release versions [skip ci]"
            git push
          fi

      - name: Pin engine release as latest
        if: steps.check-skip.outputs.skip == 'false' && steps.release.outputs.releases_created == 'true' && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_REPORT: ${{ steps.release.outputs.release_report }}
        run: |
          # README install commands point at /releases/latest/download/ion-...
          # so engine must be the release marked "latest". Mark every non-engine
          # release in this run as non-latest, then mark engine as latest.
          ENGINE_VERSION=""
          while IFS=$'\t' read -r component version; do
            [ -z "$component" ] && continue
            TAG="${component}-v${version}"
            if [ "$component" = "engine" ]; then
              ENGINE_VERSION="$version"
            else
              gh release edit "$TAG" --latest=false
            fi
          done < <(echo "$RELEASE_REPORT" | jq -r '.releases[] | "\(.component)\t\(.new_version)"')

          if [ -n "$ENGINE_VERSION" ]; then
            gh release edit "engine-v${ENGINE_VERSION}" --latest
          fi

  build:
    needs: release
    if: needs.release.outputs.releases_created == 'true'
    uses: ./.github/workflows/build.yml
    with:
      release_report: ${{ needs.release.outputs.release_report }}
    secrets: inherit

  notify:
    needs: release
    if: needs.release.outputs.releases_created == 'true'
    uses: ./.github/workflows/release-summary.yml
    with:
      release_report: ${{ needs.release.outputs.release_report }}
    secrets: inherit
