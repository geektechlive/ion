version: 2
updates:
  - package-ecosystem: gomod
    directory: /engine
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      all-go-deps:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: /relay
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      all-go-deps:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /desktop
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    versioning-strategy: increase
    groups:
      dev-deps:
        dependency-type: development
        update-types:
          - minor
          - patch
      prod-deps:
        dependency-type: production
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "electron"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    versioning-strategy: increase
    groups:
      all-npm-deps:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      all-actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /engine
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      all-docker:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /relay
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      all-docker:
        patterns:
          - "*"
